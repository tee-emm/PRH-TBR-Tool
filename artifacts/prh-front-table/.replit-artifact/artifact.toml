kind = "web"
previewPath = "/"
title = "Build Your PRH Front Table"
version = "1.0.0"
id = "artifacts/prh-front-table"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22909

[services.development]
run = "pnpm --filter @workspace/prh-front-table run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prh-front-table", "run", "build" ]
publicDir = "artifacts/prh-front-table/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22909"
BASE_PATH = "/"
